{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Prescription Calendar</title>

    <!-- FullCalendar CSS -->
<!-- FullCalendar CSS -->

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        #calendar {
            max-width: 900px;
            margin: auto;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav style="margin-bottom:20px;">
        <a href="{% url 'calendar' %}" style="margin-right:10px;">Calendar</a>

        {% if user.is_authenticated %}
            {% if user.is_staff %}
                <a href="/admin/" style="margin-right:10px;">Management Area</a>
                <a href="{% url 'rename_medication' %}" style="margin-right:10px;">Edit Medication</a>
                <a href="{% url 'mcu_log' %}" style="margin-right:10px;">MCU Log</a>
            {% endif %}
            <a href="{% url 'notification_preferences' %}" style="margin-right:10px;">Notifications</a>
            <span style="margin-right:10px;">Welcome, {{ user.username }}!</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background:none;border:none;color:#c0392b;cursor:pointer;font-size:1em;padding:0;">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" style="margin-left:10px;">Login</a>
        {% endif %}
        <a href="{% url 'mcu_login' %}" style="margin-left:10px;padding:4px 10px;background:#1E90FF;color:#fff;border-radius:4px;text-decoration:none;font-size:.9em;">MCU Login</a>
    </nav>

    <h2>Prescription Schedule</h2>
    <div id="calendar"></div>

    <!-- FullCalendar JS included as before -->
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        var calendarEl = document.getElementById("calendar");

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "timeGridWeek",
            height: "auto",
            headerToolbar: {
                left:   "prev,next today",
                center: "title",
                right:  "dayGridMonth,timeGridWeek,timeGridDay"
            },
            slotMinTime: "06:00:00",
            slotMaxTime: "24:00:00",
            allDaySlot: false,
            nowIndicator: true,
            events: "{% url 'prescription_events' %}",
            eventClick: function(info) {
                var p = info.event.extendedProps;
                alert(
                    info.event.title + "\n" +
                    "Patient: "      + p.user         + "\n" +
                    "Time: "         + p.time         + "\n" +
                    "Dose: "         + p.dose         + "\n" +
                    "Stock: "        + p.stock        + "\n" +
                    "Instructions: " + p.instructions
                );
            }
        });

        calendar.render();
    });
    </script>
</body>

<div id="notifications"></div>

<script>
    <!-- Request notifications on page -->
    if ("Notification" in window) {
    if (Notification.permission !== "granted") {
        Notification.requestPermission().then(permission => {
            console.log("Notification permission:", permission);
        });
    }
} else {
    console.log("This browser does not support notifications.");
}

    let ws;

    function connectWebSocket() {
        const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(wsProtocol + "//" + window.location.host + "/ws/notifications/");

        ws.onopen = function() {
            console.log("WebSocket connected!");
        };

        ws.onmessage = function(event) {
            let data = JSON.parse(event.data);
            console.log("Notification received:", data.message);
            if (Notification.permission === "granted") {
                new Notification("Prescription Reminder", {
                    body: data.message,
                });
            } else {
                console.log("Notification permission not granted.");
            }
        };

        ws.onclose = function() {
            console.log("WebSocket closed, reconnecting in 3s...");
            setTimeout(connectWebSocket, 3000);
        };
    }

    connectWebSocket();
    
</script>

</html>
