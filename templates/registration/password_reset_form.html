<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reset Password – EasyMedRX</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 36px 40px; width: 100%; max-width: 400px; }
        h2 { margin: 0 0 8px; font-size: 1.4em; color: #333; }
        p { color: #666; font-size: .92em; margin: 0 0 20px; }
        label { display: block; font-weight: bold; font-size: .88em; margin-bottom: 4px; }
        input[type=email] { width: 100%; padding: 9px 11px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; box-sizing: border-box; }
        button { margin-top: 16px; width: 100%; padding: 10px; background: #1E90FF; color: #fff; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
        button:hover { background: #1a7de0; }
        .back { display: block; text-align: center; margin-top: 14px; font-size: .88em; color: #888; text-decoration: none; }
        .back:hover { color: #333; }
    </style>
</head>
<body>
<div class="card">
    <h2>Reset your password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        <label for="id_email">Email address</label>
        {{ form.email }}
        {% if form.email.errors %}<p style="color:#dc3545;font-size:.85em;margin-top:4px;">{{ form.email.errors|join:", " }}</p>{% endif %}
        <button type="submit">Send reset link</button>
    </form>
    <a class="back" href="/admin/">← Back to login</a>
</div>
</body>
</html>
